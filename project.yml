name: AstroSharper
options:
  bundleIdPrefix: com.joergsflow
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

schemes:
  AstroSharper:
    build:
      targets:
        AstroSharper: all
    run:
      config: Debug
      # Local StoreKit testing — purchases are simulated against this file,
      # so the tip jar shows real-looking tiers/prices for the IAP review
      # screenshot without needing the live App Store products.
      storeKitConfiguration: AstroSharper/AstroSharper.storekit
  AstroSharperCLI:
    build:
      targets:
        AstroSharperCLI: all
    run:
      config: Debug
  AstroSharperTests:
    build:
      targets:
        AstroSharperTests: all
    test:
      config: Debug
      targets:
        - AstroSharperTests

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    # Apple Silicon only. Engine code uses `Float16(bitPattern:)`,
    # which does not exist on x86_64. Cross-compiling Intel slices
    # would break the build (see memory: feedback_arm64_only).
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: NO
    VALID_ARCHS: arm64
    EXCLUDED_ARCHS: x86_64

targets:
  AstroSharper:
    type: application
    platform: macOS
    sources:
      - path: AstroSharper
        excludes:
          - "**/.DS_Store"
          # Local StoreKit testing config — referenced by the scheme for
          # Xcode's in-IDE purchase testing, never bundled into the app.
          - "**/*.storekit"
    # Embed the three QuickLook app-extensions inside Contents/PlugIns/.
    # macOS auto-discovers them at first launch; no manual install step.
    dependencies:
      - target: SerQuickLookThumbnail
      - target: SerQuickLookPreview
      - target: AviQuickLookThumbnail
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joergsflow.AstroSharper
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: AstroSharper/Info.plist
        CURRENT_PROJECT_VERSION: 9
        MARKETING_VERSION: "0.5.5"
        PRODUCT_NAME: AstroSharper
        PRODUCT_MODULE_NAME: AstroSharper
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: AstroSharper/AstroSharper.entitlements
        DEVELOPMENT_TEAM: FDSVBU33S8
        CODE_SIGN_STYLE: Automatic
        OTHER_CODE_SIGN_FLAGS: "--timestamp"

  # ---------------------------------------------------------------
  # QuickLook extensions
  # ---------------------------------------------------------------
  # Three separate app-extension bundles so a user can disable any one
  # of them individually in System Settings → Extensions → Quick Look
  # without affecting the others:
  #
  #   SerQuickLookThumbnail  — Finder thumbnails for .ser
  #   SerQuickLookPreview    — spacebar QuickLook panel for .ser
  #   AviQuickLookThumbnail  — auto-stretched thumbnails for .avi
  #                            (replaces system AVI thumbnail; spacebar
  #                            preview is left to the system video pipe)
  #
  # All three are sandboxed, hardened, and have NO network / file
  # entitlements beyond the read-handle the QuickLook host grants them.

  SerQuickLookThumbnail:
    type: app-extension
    platform: macOS
    sources:
      - path: SerQuickLook
        excludes:
          - "**/.DS_Store"
          - "PreviewProvider.swift"
          - "Info-Preview.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joergsflow.AstroSharper.SerQuickLookThumbnail
        PRODUCT_NAME: SerQuickLookThumbnail
        PRODUCT_MODULE_NAME: SerQuickLookThumbnail
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: SerQuickLook/Info-Thumbnail.plist
        CURRENT_PROJECT_VERSION: 9
        MARKETING_VERSION: "0.5.5"
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: SerQuickLook/SerQuickLook.entitlements
        DEVELOPMENT_TEAM: FDSVBU33S8
        CODE_SIGN_STYLE: Automatic
        OTHER_CODE_SIGN_FLAGS: "--timestamp"
        SKIP_INSTALL: YES

  SerQuickLookPreview:
    type: app-extension
    platform: macOS
    sources:
      - path: SerQuickLook
        excludes:
          - "**/.DS_Store"
          - "ThumbnailProvider.swift"
          - "Info-Thumbnail.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joergsflow.AstroSharper.SerQuickLookPreview
        PRODUCT_NAME: SerQuickLookPreview
        PRODUCT_MODULE_NAME: SerQuickLookPreview
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: SerQuickLook/Info-Preview.plist
        CURRENT_PROJECT_VERSION: 9
        MARKETING_VERSION: "0.5.5"
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: SerQuickLook/SerQuickLook.entitlements
        DEVELOPMENT_TEAM: FDSVBU33S8
        CODE_SIGN_STYLE: Automatic
        OTHER_CODE_SIGN_FLAGS: "--timestamp"
        SKIP_INSTALL: YES

  AviQuickLookThumbnail:
    type: app-extension
    platform: macOS
    sources:
      - path: AviQuickLook
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joergsflow.AstroSharper.AviQuickLookThumbnail
        PRODUCT_NAME: AviQuickLookThumbnail
        PRODUCT_MODULE_NAME: AviQuickLookThumbnail
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: AviQuickLook/Info-Thumbnail.plist
        CURRENT_PROJECT_VERSION: 9
        MARKETING_VERSION: "0.5.5"
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: AviQuickLook/AviQuickLook.entitlements
        DEVELOPMENT_TEAM: FDSVBU33S8
        CODE_SIGN_STYLE: Automatic
        OTHER_CODE_SIGN_FLAGS: "--timestamp"
        SKIP_INSTALL: YES

  # Headless CLI for the regression harness, batch processing, and any
  # algorithm validation that shouldn't require launching the GUI app.
  # Reuses the same Engine/ source tree so behaviour cannot drift.
  # Sandbox is OFF so tests can read TESTIMAGES/ from any path.
  AstroSharperCLI:
    type: tool
    platform: macOS
    sources:
      - path: AstroSharper/Engine
        excludes:
          - "**/.DS_Store"
      - path: cli
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_NAME: astrosharper
        PRODUCT_MODULE_NAME: AstroSharperCLI
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: NO
        DEVELOPMENT_TEAM: FDSVBU33S8
        CODE_SIGN_STYLE: Automatic

  # Pure-engine unit tests. Hosted in the AstroSharper app target so we
  # can `@testable import AstroSharper` and reach the engine's internal
  # symbols without exposing them publicly. Tests must stay
  # GPU-independent — the heavy regression work lives in the CLI-driven
  # F3 harness against TESTIMAGES/.
  AstroSharperTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: AstroSharper
    settings:
      base:
        PRODUCT_NAME: AstroSharperTests
        PRODUCT_MODULE_NAME: AstroSharperTests
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: FDSVBU33S8
        CODE_SIGN_STYLE: Automatic
